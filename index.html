<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steal From SGA</title>
<style>
:root{
    --ink:#f7fbff;
    --muted:#aeb8c8;
    --court:#c96f38;
    --paint:#2f78b7;
    --line:rgba(255,255,255,.78);
    --green:#2cff9a;
    --red:#ff4561;
    --yellow:#ffd84a;
    --panel:rgba(10,16,25,.78);
    --thunder-blue:#0b84d8;
    --thunder-navy:#18223f;
    --thunder-orange:#f46b2a;
    --ball-color:#f28c28;
    --ball-highlight:#ffd19a;
    --ball-glow:rgba(242,140,40,.35);
}

*{ box-sizing:border-box; }

body{
    margin:0;
    overflow:hidden;
    min-height:100vh;
    background:#10141e;
    color:var(--ink);
    font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;
    touch-action:manipulation;
    user-select:none;
}

button{ font:inherit; }

#gameArea{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:
        radial-gradient(circle at 50% 44%, rgba(255,255,255,.14) 0 1px, transparent 2px 100%),
        linear-gradient(90deg, rgba(255,255,255,.08) 0 1px, transparent 1px 100%),
        linear-gradient(0deg, rgba(255,255,255,.06) 0 1px, transparent 1px 100%),
        var(--court);
    background-size:36px 36px, 84px 84px, 84px 84px, auto;
}

#courtLines{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:.9;
}
#courtLines::before{
    content:"";
    position:absolute;
    left:50%; top:50%;
    width:min(42vw,420px);
    aspect-ratio:1;
    transform:translate(-50%,-50%);
    border:4px solid var(--line);
    border-radius:50%;
}
#courtLines::after{
    content:"";
    position:absolute;
    left:50%; top:0;
    width:4px; height:100%;
    transform:translateX(-50%);
    background:var(--line);
}

.paint{
    position:absolute; top:50%;
    width:min(24vw,230px); height:min(46vh,430px);
    transform:translateY(-50%);
    border:4px solid var(--line);
    background:rgba(47,120,183,.34);
    pointer-events:none;
}
.paint.left{ left:0; border-left:0; }
.paint.right{ right:0; border-right:0; }

.arc{
    position:absolute; top:50%;
    width:min(28vw,310px); height:min(56vh,540px);
    transform:translateY(-50%);
    border:4px solid var(--line);
    border-radius:50%; opacity:.75; pointer-events:none;
}
.arc.left{ left:-15vw; }
.arc.right{ right:-15vw; }

#hud{
    position:fixed; top:14px; left:14px; right:14px; z-index:20;
    display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:8px;
    max-width:930px; pointer-events:none;
}
.hudItem{
    min-height:60px; padding:9px 12px 10px;
    border:1px solid rgba(255,255,255,.18);
    border-radius:8px; background:rgba(9,14,22,.66);
    box-shadow:0 8px 28px rgba(0,0,0,.22);
    backdrop-filter:blur(8px);
}
.hudLabel{ display:block; color:var(--muted); font-size:12px; line-height:1; }
.hudValue{ display:block; margin-top:6px; font-size:26px; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; }

#message{
    position:fixed; left:50%; top:104px; z-index:24;
    width:min(92vw,760px); min-height:72px; transform:translateX(-50%);
    display:flex; align-items:center; justify-content:center; text-align:center;
    font-size:clamp(30px,7vw,72px); font-weight:900; line-height:.95;
    text-shadow:0 8px 28px rgba(0,0,0,.7); pointer-events:none;
}

#sga{
    position:absolute; width:286px; height:430px;
    --lean:0deg; --sga-scale:1;
    left:calc(50% - 110px); top:calc(50% - 190px);
    transform-origin:50% 100%;
    transform:rotate(var(--lean)) scale(var(--sga-scale));
    transition:left .28s cubic-bezier(.2,.9,.2,1), top .28s cubic-bezier(.2,.9,.2,1), transform .18s;
    cursor:crosshair;
}
#sga::after{
    content:""; position:absolute; left:50%; bottom:24px;
    width:190px; height:36px; transform:translateX(-50%);
    border-radius:50%; background:rgba(0,0,0,.35); filter:blur(8px);
    z-index:0; pointer-events:none;
}

.sgaPhoto{
    position:absolute; inset:0; width:100%; height:100%;
    border-radius:10px; object-fit:cover;
    border:2px solid rgba(255,255,255,.26);
    box-shadow:0 18px 42px rgba(0,0,0,.42);
    opacity:0; pointer-events:none; transition:opacity .16s ease, transform .18s ease;
}
.photo-dribble{ object-position:50% 50%; }
.photo-stand{ object-position:48% 22%; }
.photo-fall{ object-position:50% 50%; }

#sga.pose-dribble .photo-dribble,
#sga.pose-fake .photo-dribble,
#sga.pose-shot .photo-stand,
#sga.fallen .photo-fall{ opacity:1; }

#sga.pose-fake .photo-dribble{ transform:scale(1.08) translateX(-9px); }
#sga.pose-shot .photo-stand{ transform:scale(1.18) translateY(-14px); }

#shadow{
    position:absolute; left:42px; bottom:-12px;
    width:158px; height:34px; border-radius:50%;
    background:rgba(0,0,0,.26); filter:blur(1px);
}

#legs, #shorts, #hair, #headband, #beard, .eye, .mouth, .arm{ display:none; }
#legs{ position:absolute; left:56px; bottom:18px; width:126px; height:198px; pointer-events:none; z-index:1; }
#legs::before, #legs::after{
    content:""; position:absolute; bottom:20px; width:34px; height:176px; border-radius:18px;
    background:linear-gradient(90deg, transparent 0 8px, rgba(244,107,42,.95) 8px 13px, transparent 13px), linear-gradient(#18223f 0 62%, #f7f7f7 63% 100%);
    transform-origin:50% 0;
}
#legs::before{ left:12px; transform:rotate(9deg); }
#legs::after{ right:12px; transform:rotate(-10deg); }
.shoe{ position:absolute; bottom:0; width:66px; height:23px; border-radius:18px 18px 8px 8px; background:linear-gradient(90deg,#f5f7ff,#d8deea); border-bottom:4px solid #b9c0ca; }
.shoe.left{ left:0; transform:rotate(-7deg); }
.shoe.right{ right:0; transform:rotate(7deg); }

#shorts{
    position:absolute; left:54px; bottom:190px; width:132px; height:78px; z-index:2;
    border:4px solid rgba(7,22,54,.9); border-top:0; border-radius:0 0 26px 26px;
    background:linear-gradient(90deg, var(--thunder-orange) 0 8px, transparent 8px calc(100% - 8px), var(--thunder-orange) calc(100% - 8px)), linear-gradient(145deg,#1298f2,#0758bd);
    box-shadow:inset 0 -14px 0 rgba(0,0,0,.14); pointer-events:none;
}
#body{
    position:absolute; left:74px; top:96px; width:144px; height:258px; z-index:12;
    border-radius:60px 60px 36px 36px; background:transparent; border:0; box-shadow:none; transition:transform .2s ease;
}
#head{ position:absolute; left:96px; top:22px; width:94px; height:104px; border-radius:50%; background:transparent; border:0; z-index:13; }
#headband{ position:absolute; left:66px; top:38px; width:108px; height:18px; z-index:8; border-radius:16px; background:#f5f7ff; border:2px solid rgba(15,22,36,.38); pointer-events:none; }
#hair{
    position:absolute; left:68px; top:8px; width:104px; height:58px; border-radius:48% 48% 30% 30%;
    background:radial-gradient(circle at 16% 22%, #050505 0 10px, transparent 11px), radial-gradient(circle at 35% 12%, #050505 0 12px, transparent 13px), radial-gradient(circle at 57% 10%, #050505 0 12px, transparent 13px), radial-gradient(circle at 78% 22%, #050505 0 10px, transparent 11px), #151515; z-index:6; pointer-events:none;
}
#hair::before, #hair::after{ content:""; position:absolute; bottom:-22px; width:22px; height:56px; border-radius:16px; background:#151515; }
#hair::before{ left:20px; transform:rotate(12deg); }
#hair::after{ right:20px; transform:rotate(-14deg); }
.eye{ position:absolute; top:78px; width:13px; height:7px; border-radius:50%; background:#201818; z-index:7; pointer-events:none; }
.eye.left{ left:96px; } .eye.right{ left:132px; }
.mouth{ position:absolute; left:108px; top:112px; width:30px; height:10px; border-bottom:4px solid #5c302b; border-radius:0 0 22px 22px; z-index:7; pointer-events:none; }
#beard{ position:absolute; left:88px; top:98px; width:64px; height:42px; z-index:7; border-bottom:10px solid rgba(35,20,17,.48); border-radius:0 0 46px 46px; pointer-events:none; }
.arm{
    position:absolute; width:34px; height:156px; border-radius:24px;
    background:linear-gradient(#a8664e 0 46%, #f4f5fb 47% 100%); border:4px solid rgba(42,26,22,.76);
    transform-origin:50% 18px; z-index:3; pointer-events:auto; transition:left .2s ease, right .2s ease, top .2s ease, transform .2s ease, height .2s ease;
}
.arm.left{ left:30px; top:186px; transform:rotate(21deg); }
.arm.right{ right:32px; top:184px; transform:rotate(-22deg); }

/* 動畫區塊 */
#sga.pose-dribble #body, #sga.pose-dribble .sgaPhoto.photo-dribble { animation: bodyBob .45s ease-in-out infinite alternate; }
#sga.pose-dribble .arm.left{ left:6px; top:210px; transform:rotate(67deg); }
#sga.pose-dribble .arm.right{ right:16px; top:178px; transform:rotate(-34deg); }
#sga.pose-dribble #ball{ animation:dribbleBounce .45s ease-in-out infinite alternate; }
#sga.pose-shot #body{ transform:translateY(-10px) rotate(-3deg); }
#sga.pose-shot .arm.left{ left:92px; top:66px; height:148px; transform:rotate(-156deg); opacity:0; }
#sga.pose-shot .arm.right{ right:82px; top:60px; height:154px; transform:rotate(150deg); opacity:0; }
#sga.pose-shot #legs::before{ transform:rotate(-2deg); }
#sga.pose-shot #legs::after{ transform:rotate(16deg); }
#sga.pose-shot #ball{ animation:shotArc 1s cubic-bezier(0.2, 0.8, 0.4, 1) infinite; }
#sga.pose-fake #body{ transform:translateX(-12px) rotate(-7deg); }
#sga.pose-fake .arm.left{ left:2px; top:184px; transform:rotate(72deg); }
#sga.pose-fake .arm.right{ right:24px; top:170px; transform:rotate(-12deg); }
#sga.pose-fake #head{ transform:translateX(-5px) rotate(-5deg); }
#sga.pose-fake #ball{ animation:fakeJab .55s ease-in-out infinite alternate; }

#ball{
    position:absolute; width:72px; height:72px; left:-8px; top:206px; z-index:10;
    border:4px solid #1b120a; border-radius:50%;
    background:radial-gradient(circle at 30% 26%, var(--ball-highlight), transparent 0 14%, transparent 15%), linear-gradient(90deg, transparent 45%, #1b120a 46% 53%, transparent 54%), linear-gradient(0deg, transparent 45%, #1b120a 46% 53%, transparent 54%), radial-gradient(circle at 50% 50%, transparent 0 56%, #1b120a 57% 61%, transparent 62%), var(--ball-color);
    box-shadow:0 10px 22px rgba(0,0,0,.32), 0 0 18px var(--ball-glow);
    cursor:pointer; transition:left .16s ease, top .16s ease, transform .12s ease, width .16s, height .16s, background .2s ease;
}

#sga.fallen{ width:340px; height:230px; cursor:default; animation:fallDrop 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
#sga.fallen #body, #sga.fallen #head{ pointer-events:none; }
#sga.fallen #ball, #ball.locked{ opacity:.28; pointer-events:none; filter:grayscale(.35); }

@keyframes fallDrop {
    0% { transform: rotate(var(--lean)) scale(var(--sga-scale)) translateY(0); }
    15% { transform: rotate(-10deg) scale(var(--sga-scale)) translateY(-15px); }
    40% { transform: rotate(-75deg) scale(var(--sga-scale)) translateY(70px) translateX(-20px); }
    100% { transform: rotate(-82deg) scale(var(--sga-scale)) translateY(75px) translateX(-45px); }
}
@keyframes bodyBob { 0% { transform: translateY(0px) rotate(1deg); } 100% { transform: translateY(8px) rotate(2deg); } }
@keyframes dribbleBounce { 0% { transform: translateY(-15px) scale(1); } 75% { transform: translateY(18px) scale(0.95, 1.05); } 90% { transform: translateY(26px) scale(1.15, 0.8); } 100% { transform: translateY(20px) scale(1, 1); } }
@keyframes shotArc { 0% { transform: translateY(10px) translateX(0) rotate(0deg) scale(1); opacity: 1; } 40% { transform: translateY(-60px) translateX(15px) rotate(-180deg) scale(0.9); opacity: 1; } 80% { transform: translateY(-10px) translateX(25px) rotate(-360deg) scale(0.8); opacity: 0; } 100% { transform: translateY(10px) translateX(0) rotate(0deg) scale(1); opacity: 0; } }
@keyframes fakeJab { 0% { transform: translateX(0) scale(1) skewX(0deg); } 30% { transform: translateX(-24px) scale(0.96) skewX(-6deg); } 60% { transform: translateX(6px) scale(1.02) skewX(2deg); } 100% { transform: translateX(0) scale(1) skewX(0deg); } }

#ball:hover{ transform:scale(1.08); }
#ball:active{ transform:scale(.92); }
#targetRing{ position:absolute; inset:-13px; border:3px solid rgba(44,255,154,.75); border-radius:50%; opacity:0; pointer-events:none; }
#ball.hot #targetRing{ animation:ringPulse .7s infinite; }
@keyframes ringPulse{ 0%{transform:scale(.78);opacity:.75;} 100%{transform:scale(1.2);opacity:0;} }
.flash{ animation:flash .28s; } .shake{ animation:shake .22s; } .pop{ animation:pop .18s; } #ball.pop{ animation:ballPop .18s; }
@keyframes flash{ 0%{filter:brightness(1.7) saturate(1.5);} 100%{filter:brightness(1) saturate(1);} }
@keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
@keyframes pop{ 0%{transform:translateX(-50%) scale(.88);} 100%{transform:translateX(-50%) scale(1);} }
@keyframes ballPop{ 0%{transform:scale(.82);} 100%{transform:scale(1);} }

#shop{ position:relative; width:100%; margin:0 0 20px; padding:12px; border:1px solid rgba(255,255,255,.18); border-radius:8px; background:rgba(9,14,22,.72); box-shadow:0 8px 28px rgba(0,0,0,.22); backdrop-filter:blur(8px); }
.shopTop{ display:grid; grid-template-columns:auto 1fr; align-items:center; gap:8px; text-align:left; }
.shopLabel{ color:var(--muted); font-size:12px; font-weight:800; text-transform:uppercase; }
#shopTokens{ font-size:24px; font-weight:900; line-height:1; text-align:right; font-variant-numeric:tabular-nums; }
#palette{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:12px; }
.colorBtn{ position:relative; aspect-ratio:1; min-width:0; border:2px solid rgba(255,255,255,.35); border-radius:50%; background:var(--swatch); cursor:pointer; color:#071113; font-size:12px; font-weight:900; line-height:1; box-shadow:inset 0 0 0 4px rgba(255,255,255,.2), 0 6px 14px rgba(0,0,0,.18); }
.colorBtn.selected{ outline:3px solid var(--green); outline-offset:2px; }
.colorBtn.locked{ filter:saturate(.5) brightness(.68); }
.colorBtn.locked::after{ content:attr(data-cost); position:absolute; inset:auto -4px -7px auto; min-width:21px; min-height:21px; display:grid; place-items:center; border-radius:50%; background:var(--yellow); border:2px solid #10141e; }

#referee{ position:fixed; right:22px; bottom:18px; z-index:21; width:128px; height:178px; pointer-events:none; transform-origin:50% 100%; }
.refCall{ position:absolute; right:74px; top:10px; min-width:132px; padding:8px 10px; border-radius:8px; background:rgba(7,11,18,.82); border:1px solid rgba(255,255,255,.24); color:var(--red); font-size:16px; font-weight:900; text-align:center; opacity:0; transform:translateY(8px) scale(.9); }
.refHead{ position:absolute; left:43px; top:22px; width:48px; height:52px; border-radius:50%; background:#d59a74; border:3px solid #221714; }
.refBody{ position:absolute; left:35px; top:70px; width:64px; height:88px; border:3px solid #1
