<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steal From SGA - Ankle Breaker Edition</title>
<style>
/* ... (CSS 保持不變，新增以下字幕樣式) ... */
#ankleBreaker{
    position:fixed; left:50%; top:50%; z-index:100;
    transform:translate(-50%,-50%) scale(0);
    font-size:clamp(50px,15vw,120px); font-weight:900; color:var(--yellow);
    text-shadow:0 0 20px rgba(255,216,74,.8), 0 0 40px rgba(255,0,0,.6);
    pointer-events:none; white-space:nowrap;
}
.showAnkle{ animation:popText 1.5s ease-out; }
@keyframes popText{ 0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);} 20%{transform:translate(-50%,-50%) scale(1.2) rotate(5deg);} 80%{transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1;} 100%{opacity:0;} }
</style>
</head>

<body>
<main id="gameArea">
    <div id="ankleBreaker">腳踝終結者</div>
    
    <div id="courtLines"></div>
    <div class="paint left"></div><div class="paint right"></div>
    <div class="arc left"></div><div class="arc right"></div>

    <section id="hud">
        <div class="hudItem"><span class="hudLabel">Score</span><span class="hudValue" id="score">0</span></div>
        <div class="hudItem"><span class="hudLabel">Combo</span><span class="hudValue" id="combo">0</span></div>
        <div class="hudItem"><span class="hudLabel">Fouls</span><span class="hudValue"><span id="fouls">0</span>/6</span></div>
        <div class="hudItem"><span class="hudLabel">Time</span><span class="hudValue" id="time">45.0</span></div>
    </section>

    <div id="message"></div>

    <div id="sga" class="pose-dribble">
        <div id="shadow"></div>
        <img class="sgaPhoto photo-dribble" src="assets/sga-dribble.jpeg">
        <img class="sgaPhoto photo-stand" src="assets/sga-standing.jpeg">
        <img class="sgaPhoto photo-fall" src="assets/sga-fall.jpeg">
        <div id="legs"><span class="shoe left"></span><span class="shoe right"></span></div>
        <div id="shorts"></div><div class="arm left"></div><div class="arm right"></div>
        <div id="body"></div><div id="head"></div>
        <div id="ball"><div id="targetRing"></div></div>
    </div>
</main>

<script>
// ... (變數定義)
let missCount = 0; // 新增：記錄未抄到球的次數
const ankleBreaker = document.getElementById("ankleBreaker");

// 修改抄球邏輯
function stealBall(){
    if(stunned) return;
    missCount = 0; // 成功抄到球，重置錯誤計數
    combo += 1;
    score += (100 + combo * 10);
    updateHud();
    showMessage("STEAL!", "var(--green)");
    moveBall();
}

// 修改點擊空白區的邏輯
gameArea.addEventListener("pointerdown", e => { 
    if(!gameRunning || stunned || e.target.id === "ball" || e.target.closest("#sga")) return;
    
    combo = 0;
    missCount++;
    
    if(missCount >= 3) {
        triggerAnkleBreaker();
        missCount = 0;
    } else {
        showMessage("WHIFF", "#dce6f7");
    }
});

// 新增：腳踝終結者效果
function triggerAnkleBreaker() {
    ankleBreaker.classList.add("showAnkle");
    playTone(200, .5, "sawtooth");
    
    // 語音報讀
    if("speechSynthesis" in window) {
        const msg = new SpeechSynthesisUtterance("Ankle Breaker!");
        msg.rate = 1.2;
        window.speechSynthesis.speak(msg);
    }
    
    setTimeout(() => ankleBreaker.classList.remove("showAnkle"), 1500);
}

// 修改 SGA 運球頻率，讓節奏更多元
function moveSGA(){
    if(!gameRunning || stunned) return;
    // 隨機頻率：運球速度在 400ms 到 1000ms 之間跳動
    const randomSpeed = Math.floor(Math.random() * 600) + 400;
    
    // 執行移動...
    const rect = sga.getBoundingClientRect();
    sga.style.left = `${Math.random() * (window.innerWidth - 200)}px`;
    sga.style.top = `${Math.random() * (window.innerHeight - 300) + 100}px`;
    
    // 重設計時器實現動態節奏
    clearTimeout(moveTimer);
    moveTimer = setTimeout(moveSGA, randomSpeed);
}

// 初始化時啟動
function startGame(){
    // ... 原有初始化代碼
    missCount = 0;
    moveSGA(); 
}
</script>
</body>
</html>
